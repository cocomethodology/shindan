<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>関係の温度と距離を整える技術 ｜ 診断</title>
<meta property="og:title" content="関係の温度と距離を整える技術 ｜ 診断">
<meta property="og:description" content="8つの問いで、いまの立ち位置を確かめる。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1114;
    --surface:#161A1F;
    --line:#2A2F36;
    --text:#E6E3DC;
    --muted:#878C94;
    --amber:#C08A3E;      /* 温度：琥珀 */
    --slate:#7E97A8;      /* 距離：氷 */
    --accent:var(--amber);
    --serif:"Shippori Mincho B1", serif;
    --sans:"Zen Kaku Gothic New", system-ui, sans-serif;
    --latin:"Cormorant Garamond", serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:var(--sans);
    font-weight:300;
    line-height:1.9;
    -webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;
    padding:clamp(28px,6vw,72px) 20px 88px;
  }
  #app{width:100%;max-width:560px}

  .eyebrow{
    font-family:var(--latin);
    font-style:italic;
    font-size:15px;
    letter-spacing:.08em;
    color:var(--muted);
  }
  h1{
    font-family:var(--serif);
    font-weight:400;
    font-size:clamp(28px,6.6vw,38px);
    line-height:1.55;
    letter-spacing:.04em;
    margin:18px 0 22px;
  }
  .lede{color:var(--muted);font-size:15px;letter-spacing:.03em}
  .rule{height:1px;background:var(--line);margin:36px 0}

  /* ---- 選択カード ---- */
  .card{
    display:block;width:100%;text-align:left;cursor:pointer;
    background:transparent;color:var(--text);
    border:1px solid var(--line);
    padding:20px 22px;margin-bottom:12px;
    font-family:var(--sans);font-size:16px;font-weight:300;line-height:1.75;
    letter-spacing:.02em;
    transition:border-color .35s ease, background .35s ease, transform .35s ease;
  }
  .card:hover,.card:focus-visible{
    border-color:var(--accent);
    background:var(--surface);
    transform:translateX(3px);
    outline:none;
  }
  .card .k{
    display:block;font-family:var(--latin);font-size:13px;
    letter-spacing:.18em;color:var(--muted);margin-bottom:6px;
  }
  .card:hover .k{color:var(--accent)}

  /* ---- 進捗 ---- */
  .ticks{display:flex;gap:6px;margin-bottom:34px}
  .tick{flex:1;height:1px;background:var(--line);transition:background .5s ease}
  .tick.on{background:var(--accent)}
  .qnum{font-family:var(--latin);font-size:14px;letter-spacing:.16em;color:var(--muted);margin-bottom:10px}
  .qtext{
    font-family:var(--serif);font-size:clamp(19px,4.6vw,23px);
    line-height:1.85;letter-spacing:.03em;margin-bottom:30px;
  }

  /* ---- 現在地マップ（署名要素） ---- */
  .field{width:100%;margin:8px 0 30px}
  .field text{font-family:var(--latin);font-size:11px;letter-spacing:.18em;fill:var(--muted)}
  .grid-line{stroke:var(--line);stroke-width:1}
  .quad{fill:transparent;transition:fill .8s ease}
  .quad.lit{fill:color-mix(in srgb, var(--accent) 9%, transparent)}
  .dot{fill:var(--accent);transition:cx 1s cubic-bezier(.22,1,.36,1), cy 1s cubic-bezier(.22,1,.36,1)}
  .halo{fill:var(--accent);opacity:.16;transition:cx 1s cubic-bezier(.22,1,.36,1), cy 1s cubic-bezier(.22,1,.36,1)}

  /* ---- 結果 ---- */
  .code{font-family:var(--latin);font-size:14px;letter-spacing:.22em;color:var(--accent)}
  .tname{font-family:var(--serif);font-size:clamp(30px,7.4vw,42px);letter-spacing:.06em;margin:10px 0 20px;font-weight:400}
  .define{font-family:var(--serif);font-size:19px;line-height:2;letter-spacing:.04em;
    border-left:2px solid var(--accent);padding:4px 0 4px 18px;margin-bottom:34px}
  .sec{margin-bottom:30px}
  .label{font-family:var(--latin);font-size:12px;letter-spacing:.2em;color:var(--muted);margin-bottom:10px}
  .sec p{font-size:15.5px;letter-spacing:.03em}

  .cta{
    display:block;text-align:center;text-decoration:none;
    padding:17px;margin-bottom:10px;font-size:15px;letter-spacing:.06em;
    border:1px solid var(--line);color:var(--text);
    transition:border-color .3s, background .3s;
  }
  .cta:hover{border-color:var(--accent);background:var(--surface)}
  .cta.primary{background:var(--accent);border-color:var(--accent);color:#0F1114;font-weight:500}
  .cta.primary:hover{opacity:.88;background:var(--accent)}
  .cta small{display:block;font-size:12px;letter-spacing:.04em;opacity:.72;margin-top:3px;font-weight:300}
  .ghost{
    background:none;border:none;color:var(--muted);font-family:var(--sans);
    font-size:13px;letter-spacing:.06em;cursor:pointer;padding:10px 0;text-decoration:underline;
    text-underline-offset:4px;
  }
  .ghost:hover{color:var(--text)}
  .fade{animation:fade .7s ease both}
  .sig{margin-top:48px;font-size:12.5px;line-height:2;letter-spacing:.05em;color:var(--muted)}
  .sig span{font-family:var(--latin);font-style:italic;font-size:14px;letter-spacing:.14em}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ===== 導線設定：ここだけ差し替えれば運用できます ===== */
const LINKS = {
  membership: "https://note.com/＿＿＿/membership",   // 最優先CTA
  line:       "https://lin.ee/＿＿＿",
  noteWork:   "https://note.com/＿＿＿/m/温度の整え方",
  noteLove:   "https://note.com/＿＿＿/m/距離の整え方",
  site:       location.origin + location.pathname
};

/* ===== 診断データ ===== */
const DECKS = {
  work: {
    key:"work", accent:"#C08A3E",
    title:"温度の診断", sub:"組織と仕事",
    lede:"熱が足りないのではなく、熱の向きが合っていない。8つの問いで、いまの温度を確かめる。",
    axes:{ x:{a:"HEAT",b:"COOL"}, y:{a:"SELF",b:"OTHER"} },
    membership:"『温度の整え方 —— 組織と仕事』",
    noteUrl:"noteWork",
    q:[
      {t:"部下の様子が、明らかにいつもと違う。", a:["すぐに声をかける","しばらく様子を見る"], ax:"x"},
      {t:"伝わっていないと感じたとき、まずすることは。", a:["言葉を足す","言葉を削る"], ax:"x"},
      {t:"現場が回っていない。", a:["自分が入って回す","任せたまま結果を待つ"], ax:"x"},
      {t:"感情が動いた場面で。", a:["その熱のまま伝える","一度置いてから伝える"], ax:"x"},
      {t:"判断に迷ったとき、最後に頼るのは。", a:["自分の基準","その場の空気"], ax:"y"},
      {t:"反対されたとき。", a:["説明を尽くして通す","いったん引いて調整する"], ax:"y"},
      {t:"評価が割れる仕事について。", a:["自分の納得を優先する","相手の満足を優先する"], ax:"y"},
      {t:"引き受けられない依頼が来たとき。", a:["理由を言って断る","断らずに抱える"], ax:"y"}
    ],
    types:{
      "aa":{code:"TEMP-01",name:"過熱型",define:"熱を上げれば伝わると信じている。",
        flaw:"熱量そのものが基準になっているため、届かないときの選択肢が「さらに熱を上げる」しか残らない。周囲は温度差を指摘できず、口を閉じることで身を守る。動いていないのは相手ではなく、温度を測る計器のほうだ。",
        move:"伝わらないという事態は、熱量の不足ではなく、受け取る余白の不足として起きている。足すのをやめた地点から、相手の判断が戻ってくる。"},
      "ab":{code:"TEMP-02",name:"供給型",define:"相手の温度に合わせ続けて、自分が冷えていく。",
        flaw:"与えることで関係を保っているため、要求だけが言えない。燃料の残量を誰にも渡していないので、尽きた瞬間は突然の離脱に見える。献身は、長く続けるほど交渉力を失う。",
        move:"与える側が要求できない関係は、優しさではなく力関係だ。渡していないのは献身ではなく、自分の残量のほうだ。"},
      "ba":{code:"TEMP-03",name:"断熱型",define:"正しさで伝えるため、熱が届かない。",
        flaw:"論理は通るのに人が動かない。冷静さは公平さとして設計されたはずが、受け手には距離として届く。正解を配っている限り、相手は判断を返してこない。",
        move:"正しさは、届いてはじめて正しさになる。配るべきものは結論ではなく、判断の余地だ。"},
      "bb":{code:"TEMP-04",name:"待機型",define:"温度を出さないことで、安全を確保している。",
        flaw:"決めないことが最も安全な選択になり、判断が滞留する。責任の席が空いたままの組織では、優秀な人から順に離れていく。中立は、しばしば不在の別名になる。",
        move:"決めないことは、選ばないことではない。決めないという判断を、すでに毎日下している。"}
    }
  },
  love: {
    key:"love", accent:"#7E97A8",
    title:"距離の診断", sub:"恋愛と関係",
    lede:"距離は、愛情の量では決まらない。8つの問いで、いまの距離を確かめる。",
    axes:{ x:{a:"NEAR",b:"FAR"}, y:{a:"SPEAK",b:"HOLD"} },
    membership:"『距離の整え方 —— 恋愛と関係』",
    noteUrl:"noteLove",
    q:[
      {t:"返事が途絶えたとき。", a:["連絡を重ねる","連絡を止める"], ax:"x"},
      {t:"会えない時期が続くと。", a:["会う口実をつくる","確かめずに待つ"], ax:"x"},
      {t:"相手の機嫌が悪いとき。", a:["そばで様子を見る","その場を離れる"], ax:"x"},
      {t:"関係が深まっていく場面で。", a:["もっと知りたくなる","少し怖くなる"], ax:"x"},
      {t:"不満が溜まったとき。", a:["言葉にして渡す","態度で示す"], ax:"y"},
      {t:"傷ついたと感じたとき。", a:["傷ついたと伝える","気づかれないようにする"], ax:"y"},
      {t:"相手の言動が引っかかったとき。", a:["その場で確認する","記憶にしまう"], ax:"y"},
      {t:"関係の終わりが頭をよぎったとき。", a:["話し合いを申し込む","静かに準備を始める"], ax:"y"}
    ],
    types:{
      "aa":{code:"DIST-01",name:"密着型",define:"不安を、距離で埋めようとする。",
        flaw:"近づくほど、相手の反応が唯一の温度計になる。返事の速さに自分の価値を預けたとき、関係は測定の対象へ変わる。埋めた距離は安心にならず、次の不安の材料として残る。求めているのは相手ではなく、確認だ。",
        move:"確認で得た安心は、確認をやめた瞬間に消える。安心とは、相手から受け取るものではなく、離れていても壊れないと知っていることだ。"},
      "ab":{code:"DIST-02",name:"追随型",define:"合わせることで、そばにいる。",
        flaw:"相手の基準に合わせ続けるうちに、自分の輪郭が薄れていく。輪郭を失った側は、要求のしかたを忘れる。我慢はやがて愛情の顔をして、尽くした年数だけ対等さが遠ざかる。",
        move:"何も望まない人を、人は大切にしようがない。望みを渡すことは、負担を渡すことではなく、触れられる場所を渡すことだ。"},
      "ba":{code:"DIST-03",name:"宣言型",define:"正しさで、線を引く。",
        flaw:"言葉は届く。ただし関係が、その言葉のかたちのまま固まる。理屈で守られた関係は壊れにくく、そのぶん温度を持たない。守られているのは関係ではなく、こちら側の安全だ。",
        move:"正しさは、傷つかないための最も上等な鎧になる。鎧を置いた場所にしか、触れられる距離は生まれない。"},
      "bb":{code:"DIST-04",name:"撤退型",define:"黙って、距離をとる。",
        flaw:"傷つく前に離れるため、傷はつかない。ただし理由だけが、相手の側に残らない。説明のないまま終わった関係は、終わらないまま次の関係へ持ち越される。",
        move:"沈黙は、優しさによく似ている。似ているだけで、届かない。残すべきものは決意ではなく、理由だ。"}
    }
  }
};

/* ===== 状態 ===== */
let deck=null, idx=0, score={x:0,y:0}, hist=[];
const app=document.getElementById("app");
const $=(h)=>{const d=document.createElement("div");d.innerHTML=h;return d.firstElementChild;};

/* 現在地マップ */
function field(px,py,lit){
  const q=lit?`<rect class="quad lit" x="${px>0?150:10}" y="${py>0?10:110}" width="140" height="100"/>`:"";
  return `<svg class="field" viewBox="0 0 300 220" role="img" aria-label="現在地">
    ${q}
    <line class="grid-line" x1="150" y1="10" x2="150" y2="210"/>
    <line class="grid-line" x1="10" y1="110" x2="290" y2="110"/>
    <text x="150" y="6" text-anchor="middle" dominant-baseline="hanging">${deck.axes.y.a}</text>
    <text x="150" y="218" text-anchor="middle">${deck.axes.y.b}</text>
    <text x="6" y="106">${deck.axes.x.b}</text>
    <text x="294" y="106" text-anchor="end">${deck.axes.x.a}</text>
    <circle class="halo" cx="${150+px*60}" cy="${110-py*45}" r="16"/>
    <circle class="dot" cx="${150+px*60}" cy="${110-py*45}" r="4"/>
  </svg>`;
}

/* ===== 画面 ===== */
function home(){
  document.documentElement.style.setProperty("--accent","#C08A3E");
  app.innerHTML=`<div class="fade">
    <p class="eyebrow">The Art of Temperature &amp; Distance</p>
    <h1>関係の温度と<br>距離を整える技術</h1>
    <p class="lede">関係がうまくいかないとき、原因は熱意でも相性でもなく、温度と距離の設計にある。8つの問いで、いまの立ち位置を確かめる。所要 約1分。</p>
    <div class="rule"></div>
    <button class="card" data-d="work"><span class="k">01 ── ORGANIZATION</span>温度の診断 ｜ 組織と仕事<br><span style="color:var(--muted);font-size:14px">伝わらない、動かない、続かない。</span></button>
    <button class="card" data-d="love"><span class="k">02 ── RELATIONSHIP</span>距離の診断 ｜ 恋愛と関係<br><span style="color:var(--muted);font-size:14px">近づけない、離れられない、言えない。</span></button>
    <p class="sig">ネイル・飲食・BAR運営20年。延べ5万人超と対話を重ねてきた実戦派による設計。<br><span>Coco Methodology</span></p>
  </div>`;
  app.querySelectorAll("[data-d]").forEach(b=>b.onclick=()=>start(b.dataset.d));
}

function start(k){
  deck=DECKS[k]; idx=0; score={x:0,y:0}; hist=[];
  document.documentElement.style.setProperty("--accent",deck.accent);
  question();
}

function question(){
  const q=deck.q[idx];
  const ticks=deck.q.map((_,i)=>`<div class="tick ${i<idx?"on":""}"></div>`).join("");
  const px=score.x/4, py=score.y/4;
  app.innerHTML=`<div class="fade">
    <div class="ticks">${ticks}</div>
    ${field(px,py,false)}
    <p class="qnum">Q ${String(idx+1).padStart(2,"0")} / 08</p>
    <p class="qtext">${q.t}</p>
    <button class="card" data-v="1"><span class="k">A</span>${q.a[0]}</button>
    <button class="card" data-v="-1"><span class="k">B</span>${q.a[1]}</button>
    ${idx>0?`<button class="ghost" id="back">ひとつ戻る</button>`:""}
  </div>`;
  app.querySelectorAll("[data-v]").forEach(b=>b.onclick=()=>{
    hist.push({ax:q.ax,v:+b.dataset.v});
    score[q.ax]+=+b.dataset.v;
    idx++;
    idx<deck.q.length?question():result();
  });
  const bk=document.getElementById("back");
  if(bk) bk.onclick=()=>{const l=hist.pop();score[l.ax]-=l.v;idx--;question();};
}

function result(){
  const kx=score.x>=0?"a":"b", ky=score.y>=0?"a":"b";
  const t=deck.types[kx+ky];
  const px=Math.max(-1,Math.min(1,score.x/4)), py=Math.max(-1,Math.min(1,score.y/4));
  const share=encodeURIComponent(`【${t.name}】${t.define}\n\n${deck.title}｜関係の温度と距離を整える技術\n${LINKS.site}`);
  app.innerHTML=`<div class="fade">
    <p class="code">${t.code} ── ${deck.title}</p>
    <h2 class="tname">${t.name}</h2>
    <p class="define">${t.define}</p>
    ${field(px,py,true)}
    <div class="sec"><p class="label">STRUCTURE ── 構造</p><p>${t.flaw}</p></div>
    <div class="sec"><p class="label">SHIFT ── 視点の置き換え</p><p>${t.move}</p></div>
    <div class="rule"></div>
    <a class="cta primary" href="${LINKS.membership}" target="_blank" rel="noopener">
      ${deck.membership} を読む<small>タイプ別の設計を、毎月ひとつずつ</small></a>
    <a class="cta" href="https://twitter.com/intent/tweet?text=${share}" target="_blank" rel="noopener">結果をシェアする</a>
    <a class="cta" href="${LINKS.line}" target="_blank" rel="noopener">個別の状況を相談する</a>
    <a class="cta" href="${LINKS[deck.noteUrl]}" target="_blank" rel="noopener">関連する記事を読む</a>
    <button class="ghost" id="again">もう一度診断する</button>
  </div>`;
  document.getElementById("again").onclick=home;
  window.scrollTo({top:0,behavior:"smooth"});
}

home();
</script>
</body>
</html>
