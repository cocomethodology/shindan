<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>診断の統計 ｜ Coco Methodology</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  :root{--paper:#fbf8f1;--card:#f6f0e6;--ink:#2b2620;--muted:#8a7f70;--faint:#b6a68f;--amber:#a8763c;--slate:#7e97a8;--line:#e4dccf;--line-2:#d8cdb8;
    --serif:"Shippori Mincho B1",serif;--sans:"Zen Kaku Gothic New",system-ui,sans-serif;--latin:"Cormorant Garamond",serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.8;-webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;padding:clamp(24px,6vw,52px) 18px 80px}
  #app{width:100%;max-width:640px}
  .eyebrow{font-family:var(--latin);font-style:italic;font-size:15px;letter-spacing:.06em;color:var(--amber)}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(24px,6vw,30px);letter-spacing:.03em;margin:8px 0 4px}
  .sub{color:var(--muted);font-size:13.5px;margin-bottom:8px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 6px}
  .tab{font-family:var(--sans);font-size:13px;letter-spacing:.03em;cursor:pointer;border:1px solid var(--line-2);
    background:none;color:var(--muted);border-radius:999px;padding:8px 16px;transition:all .2s ease}
  .tab.on{background:var(--amber);border-color:var(--amber);color:#fff}
  .tab:hover{color:var(--ink)}
  section{margin-top:26px}
  .s-h{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px solid var(--line-2);padding-bottom:8px;margin-bottom:14px}
  .s-t{font-family:var(--serif);font-size:17px;font-weight:600;letter-spacing:.03em}
  .s-n{font-size:12.5px;color:var(--faint);font-variant-numeric:tabular-nums}
  .row{display:grid;grid-template-columns:96px 1fr 74px;align-items:center;gap:10px;padding:5px 0}
  .row .nm{font-size:13.5px}
  .row .nm small{color:var(--faint);font-size:11px;letter-spacing:.05em}
  .bar{height:10px;border-radius:6px;background:var(--line);overflow:hidden}
  .bar>span{display:block;height:100%;background:var(--amber);border-radius:6px;transition:width .5s ease}
  .row.center .bar>span{background:var(--slate)}
  .row .v{text-align:right;font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .row .v b{color:var(--ink);font-weight:600}
  .sub-h{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:20px 0 8px}
  .note,.setup{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;color:var(--muted);font-size:13px;line-height:1.9}
  .setup code{font-family:ui-monospace,monospace;background:var(--paper);border:1px solid var(--line-2);border-radius:4px;padding:1px 6px;font-size:12px;color:var(--ink)}
  .setup b{color:var(--ink)}
  .reload{margin-top:22px;font-family:var(--sans);font-size:13px;color:var(--amber);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .empty{color:var(--faint);font-size:13px;padding:8px 0}
  .foot{margin-top:36px;font-size:11.5px;color:var(--faint);letter-spacing:.04em;text-align:center;line-height:2}
</style>
</head>
<body>
<div id="app">
  <p class="eyebrow">Coco Methodology ／ 診断の統計</p>
  <h1>いま、どこに立っているか。</h1>
  <p class="sub">診断を終えた人の、型の分布と入口（日付）別の集計。</p>
  <div id="body"></div>
  <button class="reload" id="reload">更新</button>
  <p class="foot">集計しているのは 型・週・入口日 のカウントのみ。個人情報は記録していません。<br><span style="font-family:var(--latin);font-style:italic">Coco Methodology</span></p>
</div>
<script>
var TYPE_ORDER = ["HH","HL","LH","LL","center"];
var TYPE_NAMES = {
  kankei: { HH:"溶ける", HL:"秘める", LH:"尽くす", LL:"守る", center:"保つ" },
  soshiki:{ HH:"背負う", HL:"こらえる", LH:"引き取る", LL:"離れる", center:"保つ" }
};
var DOM_LABEL = { kankei:"恋愛と関係", soshiki:"組織と仕事" };
var WK_DATES = { w1:["07-14","07-15","07-16","07-17","07-18","07-19","07-20"], w2:["07-21","07-22","07-23","07-24","07-25","07-26","07-27"], w3:["07-28","07-29","07-30","07-31","08-01","08-02","08-03"] };
var params = new URLSearchParams(location.search);
var KEY = params.get("key") || "";
var state = { dom: "kankei", wk: "w3", data: null };

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function render(){
  var body = document.getElementById("body");
  if (!state.data){ body.innerHTML = '<p class="empty">読み込み中…</p>'; return; }
  if (state.data.configured === false){
    body.innerHTML = '<div class="setup"><b>まだ集計ストア（Vercel KV）が接続されていません。</b><br><br>'
      + '1. Vercel のプロジェクト <b>shindan</b> → Storage → <b>KV（Upstash）</b> を作成し、このプロジェクトに接続<br>'
      + '2. 接続すると <code>KV_REST_API_URL</code> / <code>KV_REST_API_TOKEN</code> が自動で入ります<br>'
      + '3.（任意）このページを鍵付きにするなら、環境変数 <code>STATS_KEY</code> を設定し、<code>/stats?key=その値</code> で開く<br>'
      + '4. 再デプロイ後、診断を1回やってから「更新」<br></div>';
    return;
  }
  if (state.data.error){ body.innerHTML = '<div class="note">読み出しに失敗しました。KV接続と鍵をご確認ください。</div>'; return; }

  var s = state.data.stats;
  var tabs = '<div class="tabs">'
    + tab("kankei","恋愛") + tab("soshiki","組織")
    + '<span style="width:14px"></span>' + tabW("w3","今週 7/28–8/3") + tabW("w2","7/21–27") + tabW("w1","7/14–20")
    + '</div>';

  var d = (s[state.dom] && s[state.dom][state.wk]) || { total:0, type:{}, entry:{}, daytype:{} };
  var names = TYPE_NAMES[state.dom];
  var total = d.total || 0;

  // type distribution
  var typeSum = 0; TYPE_ORDER.forEach(function(t){ typeSum += (d.type[t]||0); });
  var max = 1; TYPE_ORDER.forEach(function(t){ if((d.type[t]||0)>max) max=d.type[t]; });
  var typeRows = TYPE_ORDER.map(function(t){
    var c = d.type[t]||0; var pct = typeSum? Math.round(1000*c/typeSum)/10 : 0;
    return '<div class="row'+(t==="center"?" center":"")+'">'
      + '<div class="nm">'+esc(names[t])+'人 <small>'+t+'</small></div>'
      + '<div class="bar"><span style="width:'+(max?Math.round(100*c/max):0)+'%"></span></div>'
      + '<div class="v"><b>'+c+'</b> ・ '+pct+'%</div></div>';
  }).join("");

  // entry by day
  var dates = WK_DATES[state.wk];
  var eMax = 1; for (var k in d.entry){ if(d.entry[k]>eMax) eMax=d.entry[k]; }
  var entryRows = dates.map(function(dt, i){
    var c = d.entry[i]||0;
    return '<div class="row"><div class="nm">'+dt+'</div>'
      + '<div class="bar"><span style="width:'+Math.round(100*c/eMax)+'%"></span></div>'
      + '<div class="v"><b>'+c+'</b></div></div>';
  }).join("");
  var noEntry = d.entry["-1"]||0;
  if (noEntry) entryRows += '<div class="row"><div class="nm">直接 <small>入口なし</small></div>'
    + '<div class="bar"><span style="width:'+Math.round(100*noEntry/eMax)+'%"></span></div>'
    + '<div class="v"><b>'+noEntry+'</b></div></div>';

  body.innerHTML = tabs
    + '<section><div class="s-h"><span class="s-t">'+DOM_LABEL[state.dom]+' ／ 型の分布</span><span class="s-n">完了 '+total+' 件</span></div>'
    + (typeSum ? typeRows : '<p class="empty">まだデータがありません。診断を1回終えると出ます。</p>')
    + '<p class="sub-h">入口（日付）別</p>'
    + (Object.keys(d.entry).length ? entryRows : '<p class="empty">まだありません。</p>')
    + '</section>';
}
function tab(dom,label){ return '<button class="tab'+(state.dom===dom?" on":"")+'" data-dom="'+dom+'">'+label+'</button>'; }
function tabW(wk,label){ return '<button class="tab'+(state.wk===wk?" on":"")+'" data-wk="'+wk+'">'+label+'</button>'; }

function demoData(){
  var mk = function(t){ return { total: t.reduce(function(a,b){return a+b;},0), type:{HH:t[0],HL:t[1],LH:t[2],LL:t[3],center:t[4]},
    entry:{"0":9,"1":6,"2":7,"3":11,"4":5,"5":8,"6":6,"-1":2}, daytype:{} }; };
  var empty = {total:0,type:{},entry:{},daytype:{}};
  return { configured:true, demo:true, stats:{
    kankei:{ w3: mk([7,8,8,10,13]), w2: empty, w1: empty },
    soshiki:{ w3: mk([10,7,8,10,13]), w2: empty, w1: empty } } };
}
function load(){
  if (params.get("demo")){ state.data = demoData(); render(); return; }
  state.data = null; render();
  fetch("/api/stats" + (KEY ? "?key="+encodeURIComponent(KEY) : ""), { cache:"no-store" })
    .then(function(r){ return r.json(); })
    .then(function(j){ state.data = j; render(); })
    .catch(function(){ state.data = { error:true }; render(); });
}
document.addEventListener("click", function(e){
  var t = e.target.closest("[data-dom]"); if (t){ state.dom = t.getAttribute("data-dom"); render(); return; }
  var w = e.target.closest("[data-wk]"); if (w){ state.wk = w.getAttribute("data-wk"); render(); return; }
});
document.getElementById("reload").addEventListener("click", load);
load();
</script>
</body>
</html>
